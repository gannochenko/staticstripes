<outputs>
  <output name="youtube_short" resolution="1080x1920" fps="30" />
</outputs>

<!-- Generate a dad joke using OpenAI -->
<node.openai name="joke_generator">
  <prompt
    >Generate a funny dad joke about science or technology. The joke should be
    short (2-3 sentences max), family-friendly, and include a pun. Format it as
    a Question and Answer, or as a short story with a punchline.</prompt
  >
  <model name="gpt-4o-mini" />
</node.openai>

<!-- Convert the joke to speech with word-level timing -->
<node.elevenlabs
  name="joke_speech"
  text="$joke_generator.text"
  stability="0.7"
  similarityBoost="0.8"
  style="0.3"
>
  <voice name="IKne3meq5aSn9XLyUdCD" />
  <model name="eleven_multilingual_v2" />
</node.elevenlabs>

<!-- Display the joke as animated karaoke text using the word timing from ElevenLabs -->
<!-- TODO: App nodes don't yet support dynamic references like $joke_speech.wordTiming -->
<!-- For now, using the timing data that was generated by ElevenLabs -->
<node.app
  name="joke_text"
  src="../apps/karaoke_text/dst"
  duration="5000"
  words='[{"text":"Why","start":0,"end":0.186},{"text":"did","start":0.221,"end":0.325},{"text":"the","start":0.348,"end":0.418},{"text":"computer","start":0.453,"end":0.871},{"text":"get","start":0.917,"end":1.045},{"text":"cold?","start":1.103,"end":1.463},{"text":"Because","start":1.927,"end":2.206},{"text":"it","start":2.241,"end":2.31},{"text":"left","start":2.357,"end":2.543},{"text":"its","start":2.589,"end":2.705},{"text":"Windows","start":2.752,"end":3.088},{"text":"open!","start":3.146,"end":3.413}]'
  windowSize="5"
  fontSize="96"
  textColor="#ffffff"
  highlightColor="#ffff00"
/>

<node.project>
  <title>AI-Generated Dad Joke with Speech</title>
  <tag>comedy</tag>
  <tag>ai</tag>
  <tag>dad-joke</tag>

  <assets>
    <asset name="joke_text_video" input="$joke_text.output.video" />
    <asset name="joke_audio" input="$joke_speech.audio" />
  </assets>

  <outputs>
    <output
      name="youtube_short"
      dir="output"
      filename="dad_joke.mp4"
      ffmpeg-args="-c:v libx264 -preset medium -crf 23 -c:a aac -b:a 192k"
    />
  </outputs>

  <sequences>
    <sequence>
      <fragment
        id="joke_display"
        data-asset="joke_text_video"
        data-duration="5000ms"
        data-transition-in="fade-in"
        data-transition-in-duration="500"
        data-transition-out="fade-out"
        data-transition-out-duration="500"
      />
    </sequence>
    <sequence>
      <fragment
        id="joke_audio_track"
        data-asset="joke_audio"
        data-duration="5000ms"
      />
    </sequence>
  </sequences>

  <style>
    .joke_display {
      background-color: #1a1a2e;
    }
  </style>
</node.project>

<node.filesystem name="local_output" path="$project.output.youtube_short">
  <path>output/dad_joke.mp4</path>
</node.filesystem>
