<!--
  Simple Node-Based Video Rendering Demo
  Tests: project node + filesystem node
-->

<!-- Main project node: renders video with sequences -->
<node.project>
  <title>Node Renderer Test</title>
  <tag>Test</tag>
  <tag>Demo</tag>

  <sequences>
    <!-- Video sequence -->
    <sequence>
      <fragment class="intro_image" />
      <fragment class="main_clip" />
      <fragment class="outro_image" />
    </sequence>

    <!-- Audio sequence -->
    <sequence>
      <fragment class="background_music" />
    </sequence>
  </sequences>

  <style>
    /* Intro image: 3 seconds, fade out */
    .intro_image {
      -asset: intro;
      -duration: 3000ms;
      -transition-end: fade-out 500ms;
    }

    /* Main video clip: use first 5 seconds, ambient background */
    .main_clip {
      -asset: clip_01;
      -duration: 5000ms;
      -object-fit: contain ambient 20 -0.3 0.8;
      -transition-start: fade-in 500ms;
      -transition-end: fade-out 500ms;
    }

    /* Outro image: 2 seconds, fade in */
    .outro_image {
      -asset: intro;
      -duration: 2000ms;
      -transition-start: fade-in 500ms;
      filter: instagram-lark;
    }

    /* Background music: full duration */
    .background_music {
      -asset: music;
      -duration: 10000ms;
      -transition-end: fade-out 1000ms;
    }
  </style>

  <assets>
    <!-- Static assets -->
    <asset name="intro" path="./assets/images/intro.jpg" />
    <asset name="clip_01" path="./assets/video/clip_01.mp4" />
    <asset name="music" path="./assets/audio/music.mp3" />
  </assets>

  <outputs>
    <!-- Single output: 1920x1080 @ 30fps -->
    <output name="youtube" resolution="1920x1080" fps="30" />
  </outputs>

  <ffmpeg>
    <!-- Fast preview preset with software encoding -->
    <option name="preview">
      -c:v libx264 -preset fast -crf 23 -c:a aac -b:a 192k
    </option>
  </ffmpeg>
</node.project>

<!-- Filesystem node: save output to local file -->
<node.filesystem name="local_output" path="$project.output.youtube">
  <path>output/test_video.mp4</path>
</node.filesystem>
