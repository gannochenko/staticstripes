<node.project>
  <title>Solingen, Gräfrath</title>
  <tag>travel</tag>
  <tag>vlog</tag>
  <tag>solingen</tag>
  <tag>germany</tag>

  <sequences>
    <sequence>
      <fragment class="clip" data-asset="20251030_082624" id="staircase" />
      <fragment
        class="clip"
        data-asset="20251030_075735"
        id="static_building"
      />
      <fragment class="clip" data-asset="20251030_080617" id="roofs" />
      <fragment class="clip" data-asset="20251030_080839" id="fountain" />
      <fragment class="clip" data-asset="20251030_081845" id="fluger" />
      <fragment class="clip" data-asset="20251030_081359" id="mill_wheels" />
      <fragment
        class="clip juno"
        data-asset="20251030_082017"
        id="funny_faces"
      />
      <fragment class="clip" data-asset="20251030_081645" id="forks" />
      <fragment class="clip" data-asset="20251030_081816" id="chimney_smoke" />
      <fragment
        class="clip"
        data-asset="20251029_172045"
        id="steet_view_dusk_2"
      />
      <fragment
        class="clip"
        data-asset="20251029_172756"
        id="street_view_darkness"
      />
      <fragment
        class="clip"
        data-asset="20251029_173251"
        id="museum_darkness"
      />
      <fragment class="clip" data-asset="20251029_173433" id="car" />
    </sequence>
    <sequence>
      <fragment class="music" data-asset="guitar_01" />
    </sequence>
    <sequence>
      <fragment class="text_overlay_1" data-asset="text_1_overlay" />
    </sequence>
    <sequence>
      <fragment class="text_overlay_2" data-asset="text_2_overlay" />
    </sequence>
    <sequence>
      <fragment class="text_overlay_3" data-asset="text_3_overlay" />
    </sequence>
    <sequence>
      <fragment class="text_overlay_4" data-asset="text_4_overlay" />
    </sequence>
    <sequence>
      <fragment class="text_overlay_5" data-asset="text_5_overlay" />
    </sequence>
    <sequence>
      <fragment class="text_overlay_6" data-asset="text_6_overlay" />
    </sequence>
    <sequence>
      <fragment class="text_overlay_7" data-asset="text_7_overlay" />
    </sequence>
    <sequence>
      <fragment class="text_overlay_8" data-asset="text_8_overlay" />
    </sequence>
    <sequence>
      <fragment class="geo_overlay" data-asset="geo_overlay" />
    </sequence>
  </sequences>

  <style>
    .clip {
      -sound: off;
      -object-fit: contain ambient 25 -0.1 0.7;
      -duration: 1500ms;
    }

    .juno {
      filter: instagram-juno;
    }

    .clarendon {
      filter: instagram-clarendon;
    }

    #staircase {
      -trim-start: 6000ms;
      -duration: 2500ms;
    }

    #roofs {
      -trim-start: 2000ms;
    }

    #fluger {
      -trim-start: 2000ms;
    }

    #steet_view_dusk_2 {
      -trim-start: 1500ms;
    }

    #car {
      -duration: 2000ms;
    }

    .music {
      -duration: calc(
        url(#staircase.time.duration) + url(#static_building.time.duration) +
          url(#roofs.time.duration) + url(#fountain.time.duration) +
          url(#fluger.time.duration) + url(#mill_wheels.time.duration) +
          url(#funny_faces.time.duration) + url(#forks.time.duration) +
          url(#chimney_smoke.time.duration) +
          url(#steet_view_dusk_2.time.duration) +
          url(#street_view_darkness.time.duration) +
          url(#museum_darkness.time.duration) + url(#car.time.duration)
      );
      -transition-start: fade-in 500ms;
      -transition-end: fade-out 2000ms;
    }

    /* this is not what you expect to see */
    .text_overlay_1 {
      -duration: calc(url(#staircase.time.duration));
    }

    /* but this is grafrath */
    .text_overlay_2 {
      -duration: calc(
        url(#static_building.time.duration) + url(#roofs.time.duration)
      );
      -offset-start: calc(url(#static_building.time.start));
    }

    .text_overlay_3 {
      -duration: calc(
        url(#fountain.time.duration) + url(#fluger.time.duration)
      );
      -offset-start: calc(url(#fountain.time.start));
    }

    .text_overlay_4 {
      -duration: calc(url(#mill_wheels.time.duration));
      -offset-start: calc(url(#mill_wheels.time.start));
    }

    .text_overlay_5 {
      -duration: calc(url(#funny_faces.time.duration));
      -offset-start: calc(url(#funny_faces.time.start));
    }

    .text_overlay_6 {
      -duration: calc(url(#forks.time.duration));
      -offset-start: calc(url(#forks.time.start));
    }

    .text_overlay_7 {
      -duration: calc(
        url(#street_view_darkness.time.duration) +
          url(#steet_view_dusk_2.time.duration)
      );
      -offset-start: calc(url(#steet_view_dusk_2.time.start));
    }

    .text_overlay_8 {
      -duration: calc(
        url(#car.time.duration) + url(#museum_darkness.time.duration)
      );
      -offset-start: calc(url(#museum_darkness.time.start));
    }

    .geo_overlay {
      -duration: calc(
        url(#staircase.time.duration) + url(#static_building.time.duration) +
          url(#roofs.time.duration) + url(#fountain.time.duration) +
          url(#fluger.time.duration) + url(#mill_wheels.time.duration) +
          url(#funny_faces.time.duration) + url(#forks.time.duration) +
          url(#chimney_smoke.time.duration) +
          url(#steet_view_dusk_2.time.duration) +
          url(#street_view_darkness.time.duration) +
          url(#museum_darkness.time.duration) + url(#car.time.duration)
      );
    }
  </style>

  <assets>
    <asset name="20251030_082624" path="./video/20251030_082624.mp4" />
    <asset name="20251029_172045" path="./video/20251029_172045.mp4" />
    <asset name="20251029_172756" path="./video/20251029_172756.mp4" />
    <asset name="20251029_173251" path="./video/20251029_173251.mp4" />
    <asset name="20251029_173433" path="./video/20251029_173433.mp4" />
    <asset name="20251030_075735" path="./video/20251030_075735.mp4" />
    <asset name="20251030_080617" path="./video/20251030_080617.mp4" />
    <asset name="20251030_080839" path="./video/20251030_080839.mp4" />
    <asset name="20251030_081359" path="./video/20251030_081359.mp4" />
    <asset name="20251030_081645" path="./video/20251030_081645.mp4" />
    <asset name="20251030_081816" path="./video/20251030_081816.mp4" />
    <asset name="20251030_081845" path="./video/20251030_081845.mp4" />
    <asset name="20251030_082017" path="./video/20251030_082017.mp4" />
    <asset name="guitar_01" path="./audio/guitar_01.mp3" />
    <asset name="text_1_overlay" input="$text_1.output.video" />
    <asset name="text_2_overlay" input="$text_2.output.video" />
    <asset name="text_3_overlay" input="$text_3.output.video" />
    <asset name="text_4_overlay" input="$text_4.output.video" />
    <asset name="text_5_overlay" input="$text_5.output.video" />
    <asset name="text_6_overlay" input="$text_6.output.video" />
    <asset name="text_7_overlay" input="$text_7.output.video" />
    <asset name="text_8_overlay" input="$text_8.output.video" />
    <asset name="geo_overlay" input="$geo_text.output.video" />
  </assets>

  <ffmpeg>
    <option name="preview">
      -c:v libx264 -preset ultrafast -pix_fmt yuv420p -c:a aac -b:a 192k
    </option>
  </ffmpeg>
</node.project>

<node.filesystem name="local_output" path="$project.output.instagram_shorts">
  <path>output/instagram_shorts.mp4</path>
</node.filesystem>
