<node.project>
  <title>Solingen, Gräfrath</title>
  <tag>travel</tag>
  <tag>vlog</tag>
  <tag>solingen</tag>
  <tag>germany</tag>

  <sequences>
    <sequence>
      <fragment class="clip juno" data-asset="20251030_082624" id="staircase" />
      <fragment
        class="clip"
        data-asset="20251030_075735"
        id="static_building"
      />
      <fragment class="clip" data-asset="20251030_080617" id="roofs" />
      <fragment class="clip juno" data-asset="20251030_080839" id="fountain" />
      <fragment class="clip" data-asset="20251030_081845" id="fluger" />
      <fragment class="clip" data-asset="20251030_081359" id="mill_wheels" />
      <fragment
        class="clip juno"
        data-asset="20251030_082017"
        id="funny_faces"
      />
      <fragment class="clip" data-asset="20251030_081645" id="forks" />
      <fragment
        class="clip clarendon"
        data-asset="20251030_081816"
        id="chimney_smoke"
      />
      <fragment
        class="clip"
        data-asset="20251029_172045"
        id="steet_view_dusk_2"
      />
      <fragment
        class="clip"
        data-asset="20251029_172756"
        id="street_view_darkness"
      />
      <fragment
        class="clip"
        data-asset="20251029_173251"
        id="museum_darkness"
      />
      <fragment class="clip" data-asset="20251029_173433" id="car" />
    </sequence>
    <sequence>
      <fragment class="music" data-asset="guitar_01" />
    </sequence>
    <!-- <sequence>
      <fragment class="intro_overlay" data-asset="intro_text_overlay" />
    </sequence>
    <sequence>
      <fragment class="location_overlay" data-asset="location_overlay" />
    </sequence> -->
  </sequences>

  <style>
    .clip {
      -sound: off;
      -object-fit: contain ambient 25 -0.1 0.7;
      -duration: 1500ms;
    }

    .juno {
      filter: instagram-juno;
    }

    .clarendon {
      filter: instagram-clarendon;
    }

    #staircase {
      -trim-start: 6000ms;
      -duration: 2500ms;
    }

    #roofs {
      -trim-start: 2000ms;
    }

    #fluger {
      -trim-start: 2000ms;
    }

    #steet_view_dusk_2 {
      -trim-start: 1500ms;
    }

    #car {
      -duration: 2000ms;
    }

    .music {
      -duration: calc(
        url(#staircase.time.duration) + url(#static_building.time.duration) +
          url(#roofs.time.duration) + url(#fountain.time.duration) +
          url(#fluger.time.duration) + url(#mill_wheels.time.duration) +
          url(#funny_faces.time.duration) + url(#forks.time.duration) +
          url(#chimney_smoke.time.duration) + url(#steet_view_dusk_2.time.duration) +
          url(#street_view_darkness.time.duration) + url(#museum_darkness.time.duration) +
          url(#car.time.duration)
      );
      -transition-start: fade-in 2000ms;
      -transition-end: fade-out 2000ms;
    }

    .intro_overlay {
      -duration: 2500ms;
    }

    .location_overlay {
      -duration: 21000ms;
    }
  </style>

  <assets>
    <asset name="20251030_082624" path="./video/20251030_082624.mp4" />
    <asset name="20251029_172045" path="./video/20251029_172045.mp4" />
    <asset name="20251029_172756" path="./video/20251029_172756.mp4" />
    <asset name="20251029_173251" path="./video/20251029_173251.mp4" />
    <asset name="20251029_173433" path="./video/20251029_173433.mp4" />
    <asset name="20251030_075735" path="./video/20251030_075735.mp4" />
    <asset name="20251030_080617" path="./video/20251030_080617.mp4" />
    <asset name="20251030_080839" path="./video/20251030_080839.mp4" />
    <asset name="20251030_081359" path="./video/20251030_081359.mp4" />
    <asset name="20251030_081645" path="./video/20251030_081645.mp4" />
    <asset name="20251030_081816" path="./video/20251030_081816.mp4" />
    <asset name="20251030_081845" path="./video/20251030_081845.mp4" />
    <asset name="20251030_082017" path="./video/20251030_082017.mp4" />
    <asset name="guitar_01" path="./audio/guitar_01.mp3" />
    <!-- <asset name="intro_text_overlay" input="$intro_text.output.video" />
    <asset name="location_overlay" input="$location_text.output.video" /> -->
  </assets>

  <outputs>
    <output name="instagram_shorts" resolution="1080x1920" fps="30" />
  </outputs>

  <ffmpeg>
    <option name="preview">
      -c:v libx264 -preset ultrafast -pix_fmt yuv420p -c:a aac -b:a 192k
    </option>
  </ffmpeg>
</node.project>

<node.filesystem name="local_output" path="$project.output.instagram_shorts">
  <path>output/instagram_shorts.mp4</path>
</node.filesystem>
