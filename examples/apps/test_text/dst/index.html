<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Text Overlay</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .text-container {
      background: rgba(255, 255, 255, 0.95);
      padding: 40px 60px;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      text-align: center;
      max-width: 80%;
    }

    h1 {
      font-size: 4rem;
      font-weight: 700;
      color: #333;
      margin: 0;
      line-height: 1.2;
    }

    p {
      font-size: 2rem;
      color: #666;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="text-container">
    <h1 id="title">Loading...</h1>
    <p id="subtitle"></p>
  </div>

  <script>
    // Get parameters from URL
    const params = new URLSearchParams(window.location.search);
    const title = params.get('title') || 'Hello World';
    const subtitle = params.get('subtitle') || '';
    const fontSize = params.get('fontSize') || '4';

    // Update content
    document.getElementById('title').textContent = title;
    document.getElementById('subtitle').textContent = subtitle;
    document.querySelector('h1').style.fontSize = fontSize + 'rem';

    // Signal rendering complete
    setTimeout(() => {
      document.dispatchEvent(new CustomEvent('sts-done-rendering'));
      console.log('Rendering complete signal sent');
    }, 100);
  </script>
</body>
</html>
